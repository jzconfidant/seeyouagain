<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Visualizer — 音乐可视化</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='%23fff' stroke-width='2'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23fff'/%3E%3Cpath d='M32 12 v12 M32 40 v12 M12 32 h12 M40 32 h12' stroke='%23fff' stroke-width='2'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0a0a0a; color: #fff; font-family: -apple-system, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

#canvas { position: fixed; inset: 0; z-index: 0; }

#ui {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 20px 24px; display: flex; align-items: center; gap: 20px;
  transition: transform 0.4s ease;
}
#ui.hidden { transform: translateY(100%); }

.btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer;
  font-size: 13px; letter-spacing: 1px; transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); }
.btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }

#file-input { display: none; }

select {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 9px 14px; border-radius: 8px; font-size: 13px;
  cursor: pointer; outline: none;
}
select option { background: #1a1a1a; color: #fff; }

input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
  background: #fff; cursor: pointer;
}

#info {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
  font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px; pointer-events: none;
  text-align: center;
}
#info .filename { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 4px; }

#drop-zone {
  position: fixed; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
  background: rgba(0,0,0,0.7);
}
#drop-zone.dragover { opacity: 1; pointer-events: all; }
#drop-zone .msg {
  font-size: 18px; color: rgba(255,255,255,0.6); letter-spacing: 4px;
  border: 2px dashed rgba(255,255,255,0.2); padding: 40px 60px; border-radius: 16px;
}

#toggle-ui {
  position: fixed; bottom: 24px; right: 24px; z-index: 20;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
#toggle-ui:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="info">
  <div>MUSIC VISUALIZER</div>
  <div class="filename" id="filename">拖拽音频文件或选择麦克风</div>
</div>

<div id="drop-zone">
  <div class="msg">DROP AUDIO FILE</div>
</div>

<div id="ui">
  <button class="btn" id="btn-file">📁 选择文件</button>
  <button class="btn" id="btn-mic">🎤 麦克风</button>
  <button class="btn" id="btn-play">▶ 播放</button>
  <select id="mode">
    <option value="bars">频谱条</option>
    <option value="circle">圆形</option>
    <option value="wave">波形</option>
    <option value="particles">粒子</option>
  </select>
  <label style="font-size:12px;color:rgba(255,255,255,0.4);">音量</label>
  <input type="range" id="volume" min="0" max="100" value="50">
  <label style="font-size:12px;color:rgba(255,255,255,0.4);">灵敏度</label>
  <input type="range" id="sensitivity" min="1" max="5" value="2" step="0.5">
</div>

<button id="toggle-ui">⌄</button>

<input type="file" id="file-input" accept="audio/*">

<audio id="audio" crossorigin="anonymous"></audio>

<script>
// ===================== AUDIO =====================
const audio = document.getElementById('audio');
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null, analyser = null, source = null, gainNode = null;
let isPlaying = false, isMic = false;

function initAudio() {
  if (ctx) return;
  ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.8;
  gainNode = ctx.createGain();
  gainNode.connect(ctx.destination);
  gainNode.gain.value = 0.5;
}

function connectAudio(src) {
  initAudio();
  if (source) source.disconnect();
  source = src;
  source.connect(analyser);
  analyser.connect(gainNode);
}

// ===================== FILE =====================
const fileInput = document.getElementById('file-input');
const btnFile = document.getElementById('btn-file');
const btnMic = document.getElementById('btn-mic');
const btnPlay = document.getElementById('btn-play');
const filename = document.getElementById('filename');
const dropZone = document.getElementById('drop-zone');

btnFile.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  audio.src = url;
  filename.textContent = file.name;
  isMic = false;
  btnMic.classList.remove('active');
  initAudio();
  if (source) source.disconnect();
  source = ctx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(gainNode);
  audio.play();
  isPlaying = true;
  btnPlay.textContent = '⏸ 暂停';
}

// Drag & Drop
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
  window.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
});
window.addEventListener('dragenter', () => dropZone.classList.add('dragover'));
window.addEventListener('dragleave', (e) => { if (e.clientX === 0 && e.clientY === 0) dropZone.classList.remove('dragover'); });
window.addEventListener('drop', (e) => {
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio')) loadFile(file);
});

// ===================== MIC =====================
btnMic.addEventListener('click', async () => {
  if (isMic) {
    if (ctx) ctx.close();
    ctx = null; analyser = null; source = null; gainNode = null;
    isMic = false; btnMic.classList.remove('active');
    filename.textContent = '拖拽音频文件或选择麦克风';
    return;
  }
  try {
    initAudio();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    if (source) source.disconnect();
    source = ctx.createMediaStreamSource(stream);
    source.connect(analyser);
    isMic = true; btnMic.classList.add('active');
    filename.textContent = '🎤 实时麦克风';
    btnPlay.textContent = '▶ 播放';
    isPlaying = false;
  } catch (e) {
    alert('麦克风访问被拒绝');
  }
});

// ===================== PLAY / PAUSE =====================
btnPlay.addEventListener('click', () => {
  if (isMic) return;
  if (!audio.src) { btnFile.click(); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; btnPlay.textContent = '▶ 播放'; }
  else { audio.play(); isPlaying = true; btnPlay.textContent = '⏸ 暂停'; }
});

// ===================== CONTROLS =====================
const volume = document.getElementById('volume');
const sensitivity = document.getElementById('sensitivity');
volume.addEventListener('input', (e) => { if (gainNode) gainNode.gain.value = e.target.value / 100; });

// ===================== CANVAS =====================
const canvas = document.getElementById('canvas');
const c = canvas.getContext('2d');
let W, H, mode = 'bars';
const modeSelect = document.getElementById('mode');
modeSelect.addEventListener('change', (e) => { mode = e.target.value; });

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const bufferLength = 1024;
const dataArray = new Uint8Array(bufferLength);
const timeArray = new Uint8Array(bufferLength);

let particles = [];
class Particle {
  constructor() {
    this.x = Math.random() * W; this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
    this.r = Math.random() * 2 + 1; this.baseR = this.r;
  }
  update(intensity) {
    this.x += this.vx * (1 + intensity);
    this.y += this.vy * (1 + intensity);
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
    this.r = this.baseR + intensity * 3;
  }
  draw() {
    c.beginPath(); c.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    c.fillStyle = `rgba(255,255,255,${0.3 + (this.r - this.baseR) * 0.1})`;
    c.fill();
  }
}
for (let i = 0; i < 100; i++) particles.push(new Particle());

function getAvg() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
  return sum / bufferLength / 255;
}

function hue(t) { return `hsl(${200 + t * 60}, 80%, 60%)`; }

function draw() {
  requestAnimationFrame(draw);
  c.fillStyle = 'rgba(10,10,10,0.15)';
  c.fillRect(0, 0, W, H);

  if (!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  analyser.getByteTimeDomainData(timeArray);

  const sens = parseFloat(sensitivity.value);
  const t = Date.now() / 1000;
  const avg = getAvg();

  if (mode === 'bars') {
    const bars = 128, barW = W / bars;
    for (let i = 0; i < bars; i++) {
      const idx = Math.floor(i * (bufferLength / bars));
      const val = dataArray[idx] / 255;
      const h = val * H * 0.8 * sens;
      c.fillStyle = hue(val + i / bars);
      c.fillRect(i * barW, H - h, barW - 1, h);
    }
  } else if (mode === 'circle') {
    const cx = W / 2, cy = H / 2, r = Math.min(W, H) * 0.25;
    const bars = 180;
    for (let i = 0; i < bars; i++) {
      const idx = Math.floor(i * (bufferLength / bars));
      const val = dataArray[idx] / 255;
      const angle = (i / bars) * Math.PI * 2;
      const len = val * r * 0.6 * sens;
      const x1 = cx + Math.cos(angle) * r;
      const y1 = cy + Math.sin(angle) * r;
      const x2 = cx + Math.cos(angle) * (r + len);
      const y2 = cy + Math.sin(angle) * (r + len);
      c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2);
      c.strokeStyle = hue(val + i / bars); c.lineWidth = 3; c.stroke();
    }
    // 内圈
    for (let i = 0; i < bars; i++) {
      const idx = Math.floor(i * (bufferLength / bars));
      const val = dataArray[idx] / 255;
      const angle = (i / bars) * Math.PI * 2;
      const len = val * r * 0.3 * sens;
      const x1 = cx + Math.cos(angle) * r * 0.5;
      const y1 = cy + Math.sin(angle) * r * 0.5;
      const x2 = cx + Math.cos(angle) * (r * 0.5 - len);
      const y2 = cy + Math.sin(angle) * (r * 0.5 - len);
      c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2);
      c.strokeStyle = `rgba(255,255,255,${0.2 + val * 0.3})`; c.lineWidth = 2; c.stroke();
    }
  } else if (mode === 'wave') {
    c.beginPath();
    for (let i = 0; i < bufferLength; i++) {
      const x = (i / bufferLength) * W;
      const y = (timeArray[i] / 128) * H * 0.3 + H * 0.5;
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
    }
    c.strokeStyle = hue(avg); c.lineWidth = 2; c.stroke();

    c.beginPath();
    for (let i = 0; i < bufferLength; i++) {
      const x = (i / bufferLength) * W;
      const val = dataArray[i] / 255;
      const y = H - val * H * 0.5 * sens;
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
    }
    c.strokeStyle = `rgba(255,255,255,0.2)`; c.lineWidth = 1; c.stroke();
  } else if (mode === 'particles') {
    for (const p of particles) { p.update(avg * sens); p.draw(); }
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 150) {
          c.beginPath(); c.moveTo(particles[i].x, particles[i].y); c.lineTo(particles[j].x, particles[j].y);
          c.strokeStyle = `rgba(255,255,255,${0.1 * (1 - d/150)})`; c.lineWidth = 0.5; c.stroke();
        }
      }
    }
  }
}

// ===================== UI TOGGLE =====================
const ui = document.getElementById('ui');
const toggleBtn = document.getElementById('toggle-ui');
let uiVisible = true;
toggleBtn.addEventListener('click', () => {
  uiVisible = !uiVisible;
  ui.classList.toggle('hidden', !uiVisible);
  toggleBtn.textContent = uiVisible ? '⌄' : '⌃';
});

draw();
</script>
</body>
</html>
