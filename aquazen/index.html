<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaZen — 数字鱼缸</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='32' cy='36' rx='26' ry='18' fill='none' stroke='%2338bdf8' stroke-width='2'/%3E%3Ccircle cx='20' cy='30' r='3' fill='%2338bdf8'/%3E%3Cpath d='M36 26 L44 24 L40 30' fill='%2338bdf8'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050a14; }
canvas { display: block; position: fixed; top: 0; left: 0; cursor: crosshair; }
#ui {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    font-family: 'Segoe UI', sans-serif; font-size: 12px;
    color: rgba(255,255,255,0.4); letter-spacing: 2px; pointer-events: none;
    line-height: 1.8;
}
#ui span { color: #38bdf8; font-weight: 600; }
#hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 3px;
    pointer-events: none; transition: opacity 2s; white-space: nowrap;
}
#hint.fade { opacity: 0; }
#error {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(200, 0, 0, 0.8); color: #fff; padding: 20px 30px;
    border-radius: 12px; font-family: monospace; font-size: 14px;
    max-width: 80%; z-index: 100; display: none; line-height: 1.6;
    word-break: break-all;
}
#error.show { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">鱼群: <span id="fishCount">0</span> | 食物: <span id="foodCount">0</span><br>点击投食 · 移动扰流 · D切换昼夜</div>
<div id="hint" class="fade">点击水面，鱼儿会游过来</div>
<div id="error"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let dayMode = true;
let mouseX = -100, mouseY = -100;
let foods = [];
let fishes = [];
let bubbles = [];
let plants = [];
let particles = [];

const fishColors = [
    '#f87171', '#fb923c', '#fbbf24', '#a3e635', '#34d399',
    '#22d3ee', '#60a5fa', '#818cf8', '#c084fc', '#f472b6'
];
function bgTop() { return dayMode ? '#0a3a5c' : '#020814'; }
function bgBot() { return dayMode ? '#0d2b44' : '#050a12'; }

function safeNum(v) { return Number.isFinite(v) ? v : 0; }

class Fish {
    constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * (H * 0.6) + H * 0.2;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 18 + 12;
        this.color = fishColors[Math.floor(Math.random() * fishColors.length)];
        this.tailPhase = Math.random() * Math.PI * 2;
        this.tailSpeed = Math.random() * 0.15 + 0.1;
        this.speed = Math.random() * 1.5 + 1.2;
        this.fleeTimer = 0;
    }
    update() {
        let nearestIdx = -1, minDist = Infinity;
        for (let i = foods.length - 1; i >= 0; i--) {
            const f = foods[i];
            if (!f || f.eaten) continue;
            const dx = safeNum(f.x) - safeNum(this.x);
            const dy = safeNum(f.y) - safeNum(this.y);
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < minDist && d < 300 && d > 0.001) { minDist = d; nearestIdx = i; }
        }
        if (nearestIdx !== -1) {
            const f = foods[nearestIdx];
            if (!f || f.eaten) return;
            const dx = safeNum(f.x) - safeNum(this.x);
            const dy = safeNum(f.y) - safeNum(this.y);
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < this.size * 0.5 && d > 0.001) {
                f.eaten = true;
                const px = safeNum(f.x), py = safeNum(f.y);
                for (let i = 0; i < 6; i++) particles.push(new Particle(px, py, this.color));
                this.size = Math.min(this.size + 2, 40);
            } else if (d > 0.001) {
                this.vx += (dx / d) * 0.08;
                this.vy += (dy / d) * 0.08;
            }
        }
        const mdx = safeNum(this.x) - safeNum(mouseX);
        const mdy = safeNum(this.y) - safeNum(mouseY);
        const md = Math.sqrt(mdx*mdx + mdy*mdy);
        if (md < 80 && md > 0.001) {
            this.vx += (mdx / md) * 0.5;
            this.vy += (mdy / md) * 0.5;
            this.fleeTimer = 30;
        }
        if (this.fleeTimer > 0) this.fleeTimer--;
        const maxSpd = this.fleeTimer > 0 ? this.speed * 2.5 : this.speed;
        const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
        if (spd > maxSpd && spd > 0.001) {
            this.vx = (this.vx / spd) * maxSpd;
            this.vy = (this.vy / spd) * maxSpd;
        }
        this.vx *= 0.98; this.vy *= 0.98;
        this.x = safeNum(this.x) + this.vx;
        this.y = safeNum(this.y) + this.vy;
        if (this.x < -50) this.x = W + 50;
        if (this.x > W + 50) this.x = -50;
        if (this.y < H * 0.1) { this.y = H * 0.1; this.vy *= -0.5; }
        if (this.y > H * 0.85) { this.y = H * 0.85; this.vy *= -0.5; }
        this.tailPhase += this.tailSpeed * (spd + 0.5);
    }
    draw() {
        const sx = safeNum(this.x), sy = safeNum(this.y), ss = safeNum(this.size);
        const angle = Math.atan2(safeNum(this.vy), safeNum(this.vx));
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(angle);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, ss, ss * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        const tailW = Math.sin(this.tailPhase) * ss * 0.5;
        ctx.fillStyle = this.color + 'cc';
        ctx.beginPath();
        ctx.moveTo(-ss * 0.7, 0);
        ctx.lineTo(-ss * 1.4, tailW);
        ctx.lineTo(-ss * 1.4, -tailW);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = this.color + '99';
        ctx.beginPath();
        ctx.moveTo(0, -ss * 0.3);
        ctx.lineTo(ss * 0.3, -ss * 0.8);
        ctx.lineTo(-ss * 0.3, -ss * 0.8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ss * 0.4, -ss * 0.15, ss * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(ss * 0.45, -ss * 0.15, ss * 0.06, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Food {
    constructor(x, y) {
        this.x = safeNum(x);
        this.y = safeNum(y);
        this.vy = Math.random() * 0.8 + 0.5;
        this.size = Math.random() * 4 + 6;
        this.wobble = Math.random() * Math.PI * 2;
        this.eaten = false;
        this.groundTimer = 0;
        this.age = 0;
        this.scale = 0; // 出生动画
    }
    update() {
        this.age++;
        if (this.scale < 1) this.scale += 0.08;
        this.y += this.vy;
        this.wobble += 0.03;
        this.x += Math.sin(this.wobble) * 0.3;
        if (this.y > H * 0.88) {
            this.vy *= 0.3;
            this.groundTimer++;
            if (this.groundTimer > 120) this.eaten = true;
        }
    }
    draw() {
        const sx = safeNum(this.x), sy = safeNum(this.y);
        const ss = safeNum(this.size) * this.scale;
        if (ss <= 0) return;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(this.scale, this.scale);
        // 光晕
        ctx.shadowBlur = 12;
        ctx.shadowColor = dayMode ? 'rgba(253, 230, 138, 0.6)' : 'rgba(212, 168, 67, 0.6)';
        ctx.fillStyle = dayMode ? '#fde68a' : '#d4a843';
        ctx.beginPath();
        ctx.arc(0, 0, ss, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // 高光
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(-ss * 0.3, -ss * 0.3, ss * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Bubble {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * W;
        this.y = H + 10;
        this.r = Math.random() * 4 + 1;
        this.speed = Math.random() * 0.8 + 0.3;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
    }
    update() {
        this.y -= this.speed;
        this.wobble += this.wobbleSpeed;
        this.x += Math.sin(this.wobble) * 0.5;
        if (this.y < -10) this.reset();
    }
    draw() {
        const sx = safeNum(this.x), sy = safeNum(this.y), sr = safeNum(this.r);
        ctx.strokeStyle = dayMode ? 'rgba(255,255,255,0.15)' : 'rgba(200,230,255,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = dayMode ? 'rgba(255,255,255,0.06)' : 'rgba(200,230,255,0.04)';
        ctx.fill();
    }
}

class Plant {
    constructor(x) {
        this.x = safeNum(x);
        this.segments = Math.floor(Math.random() * 6 + 5);
        this.height = Math.random() * 120 + 60;
        this.color = `hsl(${100 + Math.random() * 60}, ${40 + Math.random() * 30}%, ${20 + Math.random() * 15}%)`;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 0.015 + 0.008;
    }
    update() { this.phase += this.speed; }
    draw() {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(this.x, H);
        for (let i = 1; i <= this.segments; i++) {
            const t = i / this.segments;
            const sway = Math.sin(this.phase + i * 0.5) * (15 * t);
            ctx.lineTo(this.x + sway, H - this.height * t);
        }
        ctx.stroke();
        for (let i = 2; i < this.segments; i += 2) {
            const t = i / this.segments;
            const sway = Math.sin(this.phase + i * 0.5) * (15 * t);
            const dir = Math.sin(this.phase + i) > 0 ? 1 : -1;
            ctx.fillStyle = this.color + 'aa';
            ctx.beginPath();
            ctx.ellipse(this.x + sway + dir * 12, H - this.height * t, 10, 4, dir * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = safeNum(x); this.y = safeNum(y);
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = (Math.random() - 0.5) * 3;
        this.life = 1;
        this.color = color;
        this.size = Math.random() * 3 + 1;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.05;
        this.life -= 0.025;
    }
    draw() {
        const sx = safeNum(this.x), sy = safeNum(this.y), ss = safeNum(this.size);
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(sx, sy, ss * Math.max(0, this.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

for (let i = 0; i < 12; i++) fishes.push(new Fish());
for (let i = 0; i < 30; i++) bubbles.push(new Bubble());
for (let i = 0; i < 8; i++) plants.push(new Plant((W / 9) * (i + 1)));

canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('click', e => {
    if (foods.length < 30) foods.push(new Food(e.clientX, e.clientY));
    document.getElementById('hint').classList.add('fade');
});
canvas.addEventListener('touchstart', e => {
    if (e.touches && e.touches[0]) {
        if (foods.length < 30) foods.push(new Food(e.touches[0].clientX, e.touches[0].clientY));
    }
    e.preventDefault();
}, { passive: false });
window.addEventListener('keydown', e => { if (e.key === 'd' || e.key === 'D') dayMode = !dayMode; });

function draw() {
    try {
        const time = Date.now() * 0.001;
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, bgTop());
        grad.addColorStop(1, bgBot());
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = dayMode ? 'rgba(255,255,255,0.02)' : 'rgba(100,180,255,0.015)';
        for (let i = 0; i < 5; i++) {
            const x = (Math.sin(time + i) * 0.5 + 0.5) * W;
            const y = (Math.cos(time * 0.7 + i * 2) * 0.3 + 0.3) * H;
            ctx.beginPath();
            ctx.arc(x, y, 100 + Math.sin(time + i) * 40, 0, Math.PI * 2);
            ctx.fill();
        }

        for (let i = 0; i < plants.length; i++) { plants[i].update(); plants[i].draw(); }
        for (let i = 0; i < bubbles.length; i++) { bubbles[i].update(); bubbles[i].draw(); }

        for (let i = 0; i < foods.length; i++) foods[i].update();
        for (let i = 0; i < fishes.length; i++) fishes[i].update();
        foods = foods.filter(f => f && !f.eaten && (f.y <= H * 0.92 || f.age < 60));

        for (let i = 0; i < foods.length; i++) foods[i].draw();
        for (let i = 0; i < fishes.length; i++) fishes[i].draw();

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
        if (particles.length > 200) particles = particles.slice(-200);

        document.getElementById('fishCount').textContent = fishes.length;
        document.getElementById('foodCount').textContent = foods.length;
    } catch (err) {
        const el = document.getElementById('error');
        el.textContent = err.message + '\n' + err.stack;
        el.classList.add('show');
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
